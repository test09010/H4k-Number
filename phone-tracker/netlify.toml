[build]
  functions = "phone-tracker/netlify/functions"
  publish = "phone-tracker"

[dev]
  command = "netlify dev"
  port = 8888

# CORS Headers
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# API Routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[functions]
  node_bundler = "esbuild"

[functions.track]
  node_bundler = "esbuild"
  external_node_modules = ["fetch"]
